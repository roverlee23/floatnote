<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/tokens.css" />
    <link rel="stylesheet" href="/src/app.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>悬浮便签</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div class="window" data-od-id="window">
      <header class="titlebar" data-od-id="titlebar" id="titlebar" data-tauri-drag-region>
        <div class="traffic-lights">
          <button class="tl tl-close" id="tl-close" type="button" aria-label="关闭" data-tauri-drag-region="false"></button>
          <button class="tl tl-min" id="tl-min" type="button" aria-label="最小化" data-tauri-drag-region="false"></button>
          <button class="tl tl-max" id="tl-max" type="button" aria-label="最大化" data-tauri-drag-region="false"></button>
        </div>
        <span class="title" data-od-id="title" id="title" data-i18n="title">便签</span>
        <div class="titlebar-actions" data-od-id="titlebar-actions">
          <button class="icon-btn" id="btn-lock" data-od-id="btn-lock" data-tauri-drag-region="false" data-i18n-title="lock" title="锁定置顶"><i class="ph ph-push-pin"></i></button>
          <button class="icon-btn" id="btn-new" data-od-id="btn-new" data-tauri-drag-region="false" data-i18n-title="new_note" title="新建便签"><i class="ph ph-plus"></i></button>
          <button class="icon-btn" id="btn-settings" data-od-id="btn-settings" data-tauri-drag-region="false" data-i18n-title="settings" title="设置"><i class="ph ph-gear"></i></button>
        </div>
      </header>
      <div class="toolbar" data-od-id="toolbar">
        <button class="tool-btn" data-cmd="bold" data-od-id="btn-bold" data-i18n-title="bold" title="加粗"><b>B</b></button>
        <button class="tool-btn" data-cmd="italic" data-od-id="btn-italic" data-i18n-title="italic" title="斜体"><i>I</i></button>
        <button class="tool-btn" data-cmd="underline" data-od-id="btn-underline" data-i18n-title="underline" title="下划线"><u>U</u></button>
        <button class="tool-btn" data-cmd="strike" data-od-id="btn-strike" data-i18n-title="strike" title="删除线"><s>S</s></button>
        <button class="tool-btn" data-cmd="h2" data-od-id="btn-h2" data-i18n-title="h2" title="标题">H2</button>
        <button class="tool-btn" data-cmd="h3" data-od-id="btn-h3" data-i18n-title="h3" title="副标题">H3</button>
        <span class="divider"></span>
        <button class="tool-btn" data-cmd="bulletList" data-od-id="btn-bullet" data-i18n-title="bullet" title="无序列表"><i class="ph ph-list"></i></button>
        <button class="tool-btn" data-cmd="orderedList" data-od-id="btn-ordered" data-i18n-title="ordered" title="有序列表"><i class="ph ph-list-numbers"></i></button>
        <button class="tool-btn" data-cmd="taskList" data-od-id="btn-task" data-i18n-title="task" title="待办"><i class="ph ph-list-checks"></i></button>
        <span class="divider"></span>
        <button class="tool-btn" data-cmd="codeBlock" data-od-id="btn-code" data-i18n-title="code" title="代码块"><i class="ph ph-code"></i></button>
      </div>
      <main class="editor" data-od-id="editor" id="editor"></main>
      <footer class="statusbar" data-od-id="statusbar">
        <span class="status" data-od-id="status" id="status" data-i18n="ready">已就绪</span>
        <span class="meta" data-od-id="meta" id="meta"></span>
      </footer>
    </div>
    <div class="settings-panel" id="settings-panel" data-od-id="settings-panel" hidden>
      <div class="settings-card" data-od-id="settings-card">
        <header class="settings-header">
          <span class="settings-title" data-i18n="settings">设置</span>
          <button class="icon-btn" id="btn-close-settings" data-od-id="btn-close-settings" data-i18n-title="close" title="关闭">✕</button>
        </header>
        <div class="settings-body" data-od-id="settings-body">
          <div class="setting-row" data-od-id="row-storage">
            <label class="setting-label" for="set-storage" data-i18n="storage">存储位置</label>
            <div class="setting-control">
              <input class="setting-input" type="text" id="set-storage" data-od-id="set-storage" readonly />
              <button class="setting-btn" id="btn-pick-storage" data-od-id="btn-pick-storage" data-i18n="pick">选择…</button>
            </div>
            <span class="setting-hint" data-i18n="storage_hint">建议放到 Obsidian 的 daily 文件夹，方便和日记一起回顾</span>
          </div>
          <div class="setting-row" data-od-id="row-opacity">
            <label class="setting-label" for="set-opacity" data-i18n="opacity">透明度</label>
            <input class="setting-range" type="range" id="set-opacity" data-od-id="set-opacity" min="0.5" max="1" step="0.05" />
          </div>
          <div class="setting-row" data-od-id="row-open">
            <label class="setting-label" for="set-open-behavior" data-i18n="open_when">打开时</label>
            <select class="setting-select" id="set-open-behavior" data-od-id="set-open-behavior">
              <option value="last" data-i18n="open_last">继续上次的便签</option>
              <option value="new" data-i18n="open_new">总是新建便签</option>
            </select>
          </div>
          <div class="setting-row" data-od-id="row-theme">
            <label class="setting-label" for="set-theme" data-i18n="theme">主题</label>
            <select class="setting-select" id="set-theme" data-od-id="set-theme">
              <option value="system" data-i18n="theme_system">跟随系统</option>
              <option value="light" data-i18n="theme_light">浅色</option>
              <option value="dark" data-i18n="theme_dark">深色</option>
            </select>
          </div>
          <div class="setting-row" data-od-id="row-lang">
            <label class="setting-label" for="set-language" data-i18n="language">语言</label>
            <select class="setting-select" id="set-language" data-od-id="set-language">
              <option value="zh">中文</option>
              <option value="en">English</option>
              <option value="es">Español</option>
              <option value="fr">Français</option>
              <option value="de">Deutsch</option>
              <option value="it">Italiano</option>
              <option value="ja">日本語</option>
              <option value="ar">العربية</option>
              <option value="pt">Português</option>
              <option value="ru">Русский</option>
            </select>
          </div>
          <div class="setting-row" data-od-id="row-autostart">
            <label class="setting-label" for="set-autostart" data-i18n="autostart">开机自启动</label>
            <input class="setting-toggle" type="checkbox" id="set-autostart" data-od-id="set-autostart" />
          </div>
          <div class="setting-row" data-od-id="row-shortcut">
            <label class="setting-label" for="set-shortcut" data-i18n="shortcut">唤起快捷键</label>
            <div class="setting-control">
              <select class="setting-select" id="set-shortcut" data-od-id="set-shortcut">
                <option value="Cmd+Shift+N">⌘⇧N</option>
                <option value="Cmd+Shift+E">⌘⇧E</option>
                <option value="__custom" data-i18n="custom">自定义…</option>
                <option value="" data-i18n="disabled">禁用</option>
              </select>
              <input class="setting-input" type="text" id="set-shortcut-custom" data-od-id="set-shortcut-custom" data-i18n-placeholder="shortcut_hint" placeholder="点击录制" readonly hidden />
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
